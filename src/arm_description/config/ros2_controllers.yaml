controller_manager:
  ros__parameters:
    update_rate: 1000

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

arm_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.2
      goal_time: 5.0
      shoulder_pan_joint:
        trajectory: 0.75
        goal: 0.15
      shoulder_lift_joint:
        trajectory: 0.75
        goal: 0.15
      elbow_joint:
        trajectory: 0.75
        goal: 0.15
      wrist_1_joint:
        trajectory: 0.75
        goal: 0.15
      wrist_2_joint:
        trajectory: 0.75
        goal: 0.15
      wrist_3_joint:
        trajectory: 0.75
        goal: 0.15
